name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-ci:
    uses: OnYyon/oregon-ci-templates/.github/workflows/lint-python.yml@main
    with:
      python-version: "3.14"
      test-path: "./tests"
      coverage-threshold: 80

  docker-push:
    needs: python-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: OnYyon/oregon-ci-templates/.github/workflows/docker-push.yml@main
    with:
      push_to_registry: true
      platforms: "linux/amd64"

  docker-build:
    needs: python-ci
    if: github.event_name == 'pull_request' && github.ref == 'refs/heads/main'
    uses: OnYyon/oregon-ci-templates/.github/workflows/docker-push.yml@main
    with:
      push_to_registry: false
      platforms: "linux/amd64"
